<!DOCTYPE html>
<html>
<head>
    <title>orange parkour</title>
    <style>
        body { margin: 0; overflow: hidden; background: #002b36; font-family: sans-serif; }
        #ui { position: fixed; top: 10; left: 10; color: white; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Use A/D to move, W to Jump. <br> </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("YOUR_RENDER_URL_HERE"); // Change this after deploying to Render
const { Engine, Render, Runner, Bodies, Composite, Body } = Matter;

const engine = Engine.create();
const world = engine.world;
const render = Render.create({ element: document.body, engine: engine, options: { width: window.innerWidth, height: window.innerHeight, wireframes: false }});

// Player Setup
const myOrange = Bodies.rectangle(100, 100, 40, 40, { chamfer: { radius: 10 }, render: { fillStyle: '#ff8c00' }});
Composite.add(world, myOrange);

let otherPlayers = {};

// Handle Server Data
socket.on('init', (data) => {
    data.platforms.forEach(p => {
        const plat = Bodies.rectangle(p.x, p.y, p.w, 20, { isStatic: true, render: { fillStyle: '#073642' }});
        Composite.add(world, plat);
    });
});

socket.on('updatePlayer', (data) => {
    if (!otherPlayers[data.id]) {
        otherPlayers[data.id] = Bodies.rectangle(data.x, data.y, 40, 40, { isStatic: true, render: { fillStyle: '#859900' }});
        Composite.add(world, otherPlayers[data.id]);
    } else {
        Body.setPosition(otherPlayers[data.id], { x: data.x, y: data.y });
    }
});

socket.on('removePlayer', id => {
    if (otherPlayers[id]) {
        Composite.remove(world, otherPlayers[id]);
        delete otherPlayers[id];
    }
});

// Controls
const keys = {};
window.onkeydown = e => keys[e.key] = true;
window.onkeyup = e => keys[e.key] = false;

// Game Loop
setInterval(() => {
    if (keys['d']) Body.setVelocity(myOrange, { x: 5, y: myOrange.velocity.y });
    if (keys['a']) Body.setVelocity(myOrange, { x: -5, y: myOrange.velocity.y });
    if (keys['w'] && Math.abs(myOrange.velocity.y) < 0.1) Body.setVelocity(myOrange, { x: myOrange.velocity.x, y: -10 });

    socket.emit('move', { x: myOrange.position.x, y: myOrange.position.y });

    // Camera Follow
    Render.lookAt(render, {
        min: { x: myOrange.position.x - 400, y: myOrange.position.y - 400 },
        max: { x: myOrange.position.x + 400, y: myOrange.position.y + 400 }
    });
}, 1000/60);

Render.run(render);
Runner.run(Runner.create(), engine);
</script>
</body>
</html>
