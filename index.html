<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Many Oranges 🍊</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #002b36; color: #ff8c00; font-family: 'Arial Rounded MT Bold', sans-serif; text-align: center; margin: 0; }
        #lobby { padding: 50px; }
        .menu-box { border: 4px solid #ff8c00; display: inline-block; padding: 30px; border-radius: 20px; background: #073642; box-shadow: 0 0 20px rgba(255,140,0,0.3); }
        #game-area { display: none; padding: 20px; }
        .stats-bar { display: flex; justify-content: space-around; font-size: 1.2rem; margin-bottom: 20px; }
        .hp-container { background: #444; width: 200px; height: 15px; border-radius: 10px; border: 2px solid #ff8c00; margin-top: 5px; }
        .hp-fill { background: #ff4500; height: 100%; width: 100%; transition: width 0.4s ease; }
        .hand { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .card { background: #eee; border: 3px solid #ff8c00; border-radius: 12px; width: 130px; padding: 10px; color: #333; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 80px; height: 80px; object-fit: contain; }
        .card-name { font-weight: bold; color: #e65100; margin: 5px 0; }
        .card-desc { font-size: 0.7rem; color: #555; height: 40px; line-height: 1.2; }
        button { background: #ff8c00; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; color: white; text-transform: uppercase; }
        button:disabled { background: #555; opacity: 0.5; }
        #status-msg { font-size: 1.3rem; margin: 15px; color: #fff; text-shadow: 2px 2px #000; height: 40px; }
        input { padding: 10px; border-radius: 5px; border: none; margin: 10px; width: 250px; }
        .opponent-card {
    border: 2px solid #555 !important;
    background: #ccc !important;
}
    </style>
</head>
<body>

    <div id="lobby">
        <div class="menu-box">
            <h1>THE MANY ORANGES 🍊</h1>
            <button onclick="createGame()">CREATE MATCH</button>
            <p id="my-id-display" style="font-size: 0.8rem; color: #fff;"></p>
            <hr style="border: 1px solid #ff8c00; margin: 20px 0;">
            <input type="text" id="join-id" placeholder="Paste Lobby ID Here">
            <br>
            <button onclick="joinGame()">JOIN MATCH</button>
        </div>
    </div>

    <div id="game-area">
        <div class="stats-bar">
            <div>OPPONENT JUICE <div class="hp-container"><div id="opp-hp-fill" class="hp-fill"></div></div></div>
            <div>YOUR JUICE <div class="hp-container"><div id="my-hp-fill" class="hp-fill"></div></div></div>
        </div>
        <div id="status-msg">Waiting for Peer...</div>
        <div class="hand" id="my-hand"></div>
        <div style="margin-top: 30px;">
            <button id="swap-btn" onclick="swapHand()">SQUEEZE NEW HAND</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
